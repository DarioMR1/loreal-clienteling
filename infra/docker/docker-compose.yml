services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: loreal-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: loreal
      POSTGRES_PASSWORD: loreal
      POSTGRES_DB: loreal_clienteling
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loreal -d loreal_clienteling"]
      interval: 5s
      timeout: 5s
      retries: 5

  powersync:
    image: journeyapps/powersync-service:latest
    container_name: loreal-powersync
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./powersync/config.yaml:/config/config.yaml
    command: ["start", "-c", "/config/config.yaml"]

volumes:
  postgres_data:
